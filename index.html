<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Bio Link</title>
    <style>
        /* Cấu hình nền tối huyền ảo cho toàn bộ trang web */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.6)), url('./bgbio.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0f0f1a; 
        }

        /* Khung chứa thông tin chính giữa màn hình */
        .container {
            width: 100%;
            max-width: 400px;
            padding: 30px 20px;
            text-align: center;
        }

        /* Ảnh đại diện hình tròn có viền phát sáng */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            transition: transform 0.5s ease;
            border: 4px solid transparent;
            box-shadow: 0 0 25px #ff007f;
            animation: rgbGlow 3s linear infinite, blinkEffect 0.8s ease-in-out infinite alternate;
        }

        /* 1. Hiệu ứng đổi màu liên tục (Vòng lặp RGB) */
        @keyframes rgbGlow {
            0% { box-shadow: 0 0 25px #ff007f; border-color: #ff007f; }
            25% { box-shadow: 0 0 25px #00f2fe; border-color: #00f2fe; }
            50% { box-shadow: 0 0 25px #4facfe; border-color: #4facfe; }
            75% { box-shadow: 0 0 25px #7f00ff; border-color: #7f00ff; }
            100% { box-shadow: 0 0 25px #ff007f; border-color: #ff007f; }
        }

        /* 2. Hiệu ứng nhấp nháy tỏa sáng phóng đại */
        @keyframes blinkEffect {
            0% { transform: scale(1); }
            100% { box-shadow: 0 0 40px #ff007f, 0 0 15px #00f2fe; }
        }

        .avatar:hover {
            transform: scale(1.98); 
        }

        /* Tên và tiểu sử ngắn */
        h1 {
            font-size: 1.8rem;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 0.9rem;
            color: #8a8a9e;
            margin-bottom: 30px;
        }

        /* Định dạng các nút liên kết mạng xã hội */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: block;
            padding: 16px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.05rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Hiệu ứng phát sáng và đẩy lên khi tương tác */
        .link-card:hover {
            transform: translateY(-4px);
            border-color: #00f2fe;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
            background: rgba(0, 242, 254, 0.1);
        }
    </style>
</head>
